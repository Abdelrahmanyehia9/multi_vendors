name: multi_vendor
description: "Multi vendor With Local brands"
version: 1.0.0+8

environment:
  sdk: ^3.9.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:

  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  shared_preferences: ^2.5.3
  cached_network_image: ^3.4.1
  flutter_bloc: ^9.1.1
  url_launcher: ^6.3.2
  get_it: ^8.2.0
  intl_phone_field: ^3.2.0
  carousel_slider: ^5.1.2
  supabase_flutter: ^2.12.0
  skeletonizer: ^2.1.3
  collection: ^1.19.1
  dartz: ^0.10.1
  equatable: ^2.0.8
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  pin_code_fields: ^9.1.0
  flutter_spinkit: ^5.2.2
  flutter_svg: ^2.2.4
  app_links: ^6.4.1
  easy_debounce: ^2.0.3
  loader_overlay: ^5.0.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  image_picker: ^1.2.1
  image_cropper: ^12.2.1
  photo_view: ^0.15.0
  easy_localization: ^3.0.8
  in_app_review: ^2.0.11
  flutter_native_splash: ^2.4.7
  package_info_plus: ^9.0.0
  connectivity_plus: ^7.1.1
  internet_connection_checker_plus: ^3.0.1
  onesignal_flutter: ^5.1.2
  flutter_local_notifications: ^21.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
     - assets/images/
     - assets/icons/
     - assets/svg/
     - assets/animations/
     - assets/languages/
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: mvIcon
      fonts:
        - asset: assets/font/mv_icons/mvIcon.ttf
    - family: Montserrat
      fonts:
        - asset: assets/font/motserrat/Montserrat-Thin.ttf
          weight: 100
        - asset: assets/font/motserrat/Montserrat-ExtraLight.ttf
          weight: 200
        - asset: assets/font/motserrat/Montserrat-Light.ttf
          weight: 300
        - asset: assets/font/motserrat/Montserrat-Regular.ttf
          weight: 400
        - asset: assets/font/motserrat/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/font/motserrat/Montserrat-Bold.ttf
          weight: 700
        - asset: assets/font/motserrat/Montserrat-ExtraBold.ttf
          weight: 800
        - asset: assets/font/motserrat/Montserrat-Black.ttf
          weight: 900
    - family: Tajawal
      fonts:
        - asset: assets/font/Tajawal/Tajawal-ExtraLight.ttf
          weight: 100
        - asset: assets/font/Tajawal/Tajawal-ExtraLight.ttf
          weight: 200
        - asset: assets/font/Tajawal/Tajawal-Light.ttf
          weight: 300
        - asset: assets/font/Tajawal/Tajawal-Regular.ttf
          weight: 400
        - asset: assets/font/Tajawal/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/font/Tajawal/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/font/Tajawal/Tajawal-ExtraBold.ttf
          weight: 800
        - asset: assets/font/Tajawal/Tajawal-Black.ttf
          weight: 900
    - family: Alexanderia
      fonts:
        - asset: assets/font/alexanderia/Alexandria-Thin.ttf
          weight: 100
        - asset: assets/font/alexanderia/Alexandria-Light.ttf
          weight: 200
        - asset: assets/font/alexanderia/Alexandria-Regular.ttf
          weight: 300
        - asset: assets/font/alexanderia/Alexandria-Medium.ttf
          weight: 400
        - asset: assets/font/alexanderia/Alexandria-SemiBold.ttf
          weight: 500
        - asset: assets/font/alexanderia/Alexandria-Bold.ttf
          weight: 700
        - asset: assets/font/alexanderia/Alexandria-ExtraBold.ttf
          weight: 800
        - asset: assets/font/alexanderia/Alexandria-Black.ttf
          weight: 900

  #     - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
